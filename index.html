<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asisten-Ane - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- MathJax untuk rumus matematika/fisika/biologi -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Prism.js untuk syntax highlighting VSCode-style -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat Asisten-Ane...</div>
    </div>

    <!-- Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
    
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Main App Container -->
    <div class="app">
        <!-- SIDEBAR - Minimalist -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <span class="logo-text">Asisten-Ane</span>
                </div>
                
                <!-- Mode Toggle: Quick / Project -->
                <div class="mode-section" id="chatModeSection" style="display:none;">
                    <button class="mode-option active" id="quickChatModeBtn" onclick="setChatMode('quick')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        Quick
                    </button>
                    <button class="mode-option" id="projectModeBtn" onclick="setChatMode('project')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        Project
                    </button>
                </div>

                <!-- Action Buttons -->
                <button class="new-chat-btn" id="newChatBtn" style="display:none;" onclick="startNewQuickChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"></path></svg>
                    Chat Baru
                </button>
                <button class="new-chat-btn project-mode" id="newProjectBtn" style="display:none;" onclick="showNewProjectModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"></path></svg>
                    Project Baru
                </button>
            </div>

            <!-- Quick Chat History List (shown in quick mode) -->
            <div class="projects-list" id="quickChatHistory" style="display:none;">
                <div class="section-divider">Riwayat Chat</div>
            </div>

            <!-- Projects List (shown in project mode) -->
            <div class="projects-list" id="projectsList" style="display:none;">
                <div class="section-divider">Projects</div>
            </div>

            <!-- User Section - Minimalist Login -->
            <div class="user-section">
                <div class="user-info" id="userInfo">
                    <div id="authSection"></div>
                </div>
            </div>
        </aside>

        <!-- MAIN CHAT AREA -->
        <main class="main-chat">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="chat-title">
                    <h3 id="currentChatTitle">Asisten-Ane</h3>
                    <span class="mode-badge quick" id="modeBadge">Quick Chat</span>
                    <div class="status-indicator">
                        <span class="status-dot offline" id="statusDot"></span>
                        <span id="statusText">Memuat...</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleTheme()" title="Tema Gelap/Terang">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <button class="icon-btn" id="deleteAllBtn" style="display:none;" onclick="clearCurrentChat()" title="Hapus Chat Ini">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </header>
            
            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🤖</div>
                    <h2>Selamat Datang!</h2>
                    <p id="welcomeMessage">Silakan login untuk mulai berbicara.</p>
                    <div class="example-prompts">
                        <div class="example-prompt" onclick="setExamplePrompt('Buatkan kode HTML sederhana')"><span>💻</span> Buatkan HTML</div>
                        <div class="example-prompt" onclick="setExamplePrompt('Jelaskan rumus fisika')"><span>🔬</span> Rumus Fisika</div>
                        <div class="example-prompt" onclick="setExamplePrompt('Tips belajar coding')"><span>📚</span> Tips Coding</div>
                        <div class="example-prompt" onclick="setExamplePrompt('Hitung integral ∫x²dx')"><span>🔢</span> Matematika</div>
                    </div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area" id="inputArea">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="Ketik pesan... (Enter kirim)" rows="1"></textarea>
                        <div class="input-actions">
                            <span class="input-hint">Shift+Enter untuk baris baru</span>
                            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                                Kirim
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: New Project -->
    <div class="modal" id="newProjectModal">
        <div class="modal-content">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                Project Baru
            </h3>
            <input type="text" id="projectNameInput" placeholder="Nama project..." autocomplete="off">
            <div class="modal-actions">
                <button onclick="closeModal()">Batal</button>
                <button onclick="createProject()">Buat</button>
            </div>
        </div>
    </div>

    <!-- Prism.js Core + Languages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    
    <!-- Main JS -->
    <script src="app.js"></script>
</body>
</html>
